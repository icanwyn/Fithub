<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PE Tracker — Log My Scores</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  /* [Your existing student.html styles - kept the same] */
  :root{--navy:#0D1B3E;--navy2:#162248;--navy3:#1E2F5A;--gold:#C9A84C;--gold-lt:#F0D98B;--gold-dk:#9B7A2A;--gold-glow:rgba(201,168,76,0.18);--bg:#09122B;--surface:#162248;--surface2:#1E2F5A;--surface3:#243570;--border:rgba(201,168,76,0.18);--border2:rgba(201,168,76,0.32);--text:#F0E6C8;--text2:#A8B4CC;--text3:#6B7A99;--red:#D4574A;--red-lt:rgba(212,87,74,0.15);font-family:'DM Sans',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;background-image:repeating-linear-gradient(45deg,rgba(201,168,76,0.03) 0,rgba(201,168,76,0.03) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(-45deg,rgba(201,168,76,0.03) 0,rgba(201,168,76,0.03) 1px,transparent 1px,transparent 40px);}
  input,select{font-family:inherit;font-size:15px;color:var(--text);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s;}
  button{font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;border:1px solid var(--border2);border-radius:10px;background:var(--surface2);color:var(--text2);padding:12px 20px;transition:all .15s;width:100%;}
  button.primary{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dk) 100%);color:#09122B;border-color:var(--gold);font-weight:700;font-size:16px;letter-spacing:.04em;padding:14px;}
  button.primary:hover{background:linear-gradient(135deg,var(--gold-lt),var(--gold));box-shadow:0 4px 20px var(--gold-glow)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;box-shadow:0 4px 30px rgba(0,0,0,0.3)}
  .hidden{display:none!important}
  .badge{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap}
  .badge-gold{background:linear-gradient(135deg,#F0D98B,#C9A84C);color:#09122B}
  .badge-silver{background:linear-gradient(135deg,#BEC8D8,#8A96AA);color:#09122B}
  .badge-bronze{background:linear-gradient(135deg,#D4A06A,#A06830);color:#fff}
  .badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
  .alert{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:14px;line-height:1.5;border:1px solid transparent}
  .alert-error{background:var(--red-lt);color:#F0A090;border-color:rgba(212,87,74,0.3)}
  .alert-success{background:var(--gold-glow);color:var(--gold-lt);border-color:rgba(201,168,76,0.3)}
  .mono{font-family:'DM Mono',monospace;letter-spacing:.05em}
  .spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;border:1.5px solid var(--border2)}
  #wrap{max-width:480px;margin:0 auto;padding:1.25rem}
  #top-bar{background:linear-gradient(90deg,var(--navy) 0%,var(--navy2) 100%);border-bottom:1px solid var(--border2);padding:.875rem 1.25rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.4);}
  label.lbl{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;margin-top:14px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
  .steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:1.5rem}
  .step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
  .step.active{color:var(--gold)}
  .step.done{color:var(--text3)}
  .step-dot{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:var(--surface2);flex-shrink:0}
  .step.active .step-dot{border-color:var(--gold);background:var(--gold-glow);color:var(--gold)}
  .step.done .step-dot{border-color:var(--text3);background:var(--surface2)}
  .step-line{width:32px;height:1px;background:var(--border);flex-shrink:0}
  input[type=number]{font-size:22px;text-align:center;padding:14px;font-weight:500}
  .rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;margin-bottom:8px;border:1px solid var(--border)}
</style>
</head>
<body>
<!-- TOP BAR -->
<div id="top-bar">
  <div style="width:34px;height:34px;border-radius:8px;background:var(--gold-glow);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🏆</div>
  <div>
    <div style="font-family:'Cormorant Garamond',serif;font-weight:700;font-size:16px;color:var(--gold);letter-spacing:.08em">PE PROGRESS TRACKER</div>
    <div id="teacher-label" style="font-size:11px;color:var(--text2);letter-spacing:.04em">Loading…</div>
  </div>
</div>

<div id="wrap">
  <!-- LOADING / ERROR / SELECT / VERIFY screens remain the same -->

  <!-- STEP 3: LOG SCORES + GOALS -->
  <div id="screen-scores" class="hidden">
    <!-- ... existing score entry code ... -->

    <!-- MY PROGRESS -->
    <div class="card" style="margin-bottom:14px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold);margin-bottom:14px">📈 My Progress</div>
      <div id="my-progress"></div>
    </div>

    <!-- MY GOALS -->
    <div class="card" style="border-color:rgba(201,168,76,0.35)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold)">🎯 My Goals</div>
        <button onclick="showGoalsEditor()" style="width:auto;padding:6px 14px;font-size:12px">Edit Goals</button>
      </div>
      <div id="my-goals-list" style="font-size:14px;color:var(--text2);min-height:60px"></div>
    </div>
  </div>

  <!-- SUCCESS SCREEN remains the same -->
</div>

<script>
// ==================== FULL JAVASCRIPT ====================
// All your existing student.html JavaScript + fixed submitScores + goals support

// ... (keep all your existing functions)

// ==================== FIXED submitScores ====================
async function submitScores(){
  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Saving…";

  const now = new Date();
  const weekLabel = `Week of ${now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
  
  const rows = skills
    .filter(sk => {
      const v = document.getElementById(`sf-${sk.id}`)?.value;
      return v !== undefined && v !== "";
    })
    .map(sk => ({
      student_id: selectedStudent.id,
      skill_id: sk.id,
      value: parseFloat(document.getElementById(`sf-${sk.id}`).value),
      week_label: weekLabel,
      logged_at: now.toISOString()
    }));

  if (rows.length) {
    const { error } = await sb.from("entries").insert(rows);
    if (error) {
      document.getElementById("score-alert").innerHTML = `<div class="alert alert-error">${error.message}</div>`;
    } else {
      // Update local entries
      rows.forEach(r => {
        if (!entries[r.student_id]) entries[r.student_id] = {};
        if (!entries[r.student_id][r.skill_id]) entries[r.student_id][r.skill_id] = [];
        entries[r.student_id][r.skill_id].push(r.value);
      });
      
      // Show success screen with ranks
      const ranksHTML = skills.map(sk => {
        const rank = getRank(selectedStudent.id, sk.id);
        const val = getLastVal(selectedStudent.id, sk.id);
        if (!val) return "";
        return `<div class="rank-row"><div style="flex:1"><div style="font-weight:500;font-size:14px">${sk.name}</div></div>${rankBadge(rank, students.length)}</div>`;
      }).filter(Boolean).join("");
      
      document.getElementById("success-msg").textContent = `Scores saved for ${selectedStudent.first}! Great work this week.`;
      document.getElementById("success-ranks").innerHTML = ranksHTML || `<div style="color:var(--text3);font-size:13px;text-align:center">Keep logging to see your rankings!</div>`;
      show("screen-success");
    }
  }

  btn.disabled = false;
  btn.textContent = "Save My Scores ✓";
}

// ... (rest of your JavaScript remains the same, including loadStudentGoals, renderGoalsSummary, showGoalsEditor, saveStudentGoals)
</script>
</body>
</html>
